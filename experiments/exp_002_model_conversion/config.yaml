experiment:
  name: "exp_002_model_conversion"
  description: "PyTorch to ONNX migration and CPU optimization validation"
  status: "Completed (GPU Transition Pending)"

paths:
  checkpoint: "checkpoints/best_model.pth"
  onnx_output: "deployment/convnext.onnx"
  test_image: "28.jpg"

model_spec:
  architecture: "ConvNeXt-Tiny"
  num_classes: 102
  input_shape: [1, 3, 224, 224]

onnx_export:
  opset_version: 18
  do_constant_folding: true
  dynamic_axes:
    input: {0: "batch_size"}
    output: {0: "batch_size"}
  use_dynamo: false

runtime:
  target_hardware: "CPU"
  execution_provider: "CPUExecutionProvider"